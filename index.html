<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>QA Test Case Generator</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    body{
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1{
      margin-top: 0;
    }
    textarea{
      width: 100%;
      height: 320px;
      padding: 12px;
      font-family: monospace;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      resize: vertical;
      background: white;
    }
    button{
      margin-top: 12px;
      margin-right: 10px;
      padding: 12px 18px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:disabled{
      opacity: 0.5;
      cursor: not-allowed;
    }
    .panel{
      margin-top: 18px;
      padding: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      white-space: pre-wrap;
    }
    .downloads{
      margin-top: 12px;
    }
    .meta{
      margin-top: 8px;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>QA Test Case Generator</h1>

  <textarea id="stories">
US DESCRIPTION
As a Navigator I want to record member consent so that the program has authorization to share information.

ACs
AC1 Given the Navigator opens the ROI assessment
When the form loads
Then the member name and ID are pre-populated

AC2 Given the Navigator completes required fields
When the Navigator clicks Submit
Then the system records completion date and user
  </textarea>

  <br>

  <button id="generateBtn" onclick="submitStories()">Generate Test Cases</button>

  <div class="meta" id="meta">Waiting...</div>

  <div class="downloads">
    <button id="downloadScenarioBtn" onclick="downloadScenarioMatrix()" disabled>
      Download Scenario Matrix
    </button>
    <button id="downloadCoverageBtn" onclick="downloadCoverageMap()" disabled>
      Download Coverage Map
    </button>
  </div>

  <div class="panel" id="result">No result yet.</div>

  <script>
    let lastScenarioMatrix = [];
    let lastCoverageMap = [];

    async function submitStories() {
      const stories = document.getElementById("stories").value.trim();
      const result = document.getElementById("result");
      const meta = document.getElementById("meta");
      const generateBtn = document.getElementById("generateBtn");
      const scenarioBtn = document.getElementById("downloadScenarioBtn");
      const coverageBtn = document.getElementById("downloadCoverageBtn");

      if (!stories) {
        result.textContent = "Please paste at least one user story.";
        return;
      }

      generateBtn.disabled = true;
      scenarioBtn.disabled = true;
      coverageBtn.disabled = true;
      result.textContent = "Processing...";
      meta.textContent = "Generating QA package...";

      try {
        const response = await fetch("/submit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            stories_text: stories
          })
        });

        const data = await response.json();

        if (!response.ok) {
          result.textContent = data.message || data.error || "Request failed.";
          meta.textContent = "Error";
          generateBtn.disabled = false;
          return;
        }

        lastScenarioMatrix = Array.isArray(data.scenarioMatrix) ? data.scenarioMatrix : [];
        lastCoverageMap = Array.isArray(data.coverageMap) ? data.coverageMap : [];

        result.textContent = data.adoDocument || "No ADO document returned.";
        meta.textContent = `Stories processed: ${data.storiesProcessed || 0} | Scenario rows: ${lastScenarioMatrix.length} | Coverage rows: ${lastCoverageMap.length}`;

        scenarioBtn.disabled = lastScenarioMatrix.length === 0;
        coverageBtn.disabled = lastCoverageMap.length === 0;
      } catch (error) {
        result.textContent = "Error: " + error.message;
        meta.textContent = "Request failed";
      } finally {
        generateBtn.disabled = false;
      }
    }

    function downloadScenarioMatrix() {
      if (!lastScenarioMatrix.length) return;
      downloadExcel(lastScenarioMatrix, "qa_test_design_scenarios.xlsx", "Scenario_Matrix");
    }

    function downloadCoverageMap() {
      if (!lastCoverageMap.length) return;
      downloadExcel(lastCoverageMap, "qa_test_design_coverage.xlsx", "Coverage_Map");
    }

    function downloadExcel(rows, filename, sheetName) {
      const workbook = XLSX.utils.book_new();
      const worksheet = XLSX.utils.json_to_sheet(rows);
      XLSX.utils.book_append_sheet(workbook, worksheet, sheetName);
      XLSX.writeFile(workbook, filename);
    }
  </script>

</body>
</html>
