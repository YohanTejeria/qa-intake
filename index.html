<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QA Test Case Intake</title>

  <style>
    body{
      font-family: Arial;
      max-width:900px;
      margin:40px auto;
      padding:20px;
      background:#f5f5f5;
    }

    textarea{
      width:100%;
      height:320px;
      padding:10px;
      font-family:monospace;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button{
      margin-top:10px;
      padding:12px 18px;
      background:black;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    #result{
      margin-top:20px;
      padding:15px;
      border:1px solid #ccc;
      border-radius:8px;
      background:white;
      white-space:pre-wrap;
    }
  </style>
</head>

<body>

<h2>QA Test Case Generator</h2>

<textarea id="stories">

US DESCRIPTION
As a Navigator I want to create an ROI assessment

ACs
AC1 ...
AC2 ...

----

US DESCRIPTION
As a Program Administrator I want...

ACs
AC1 ...
AC2 ...

</textarea>

<br>

<button onclick="submitStories()">Generate Test Cases</button>

<div id="result">Waiting...</div>

<script>

async function submitStories(){

  const stories = document.getElementById("stories").value
  const result = document.getElementById("result")

  result.textContent="Processing..."

  const response = await fetch("/api/submit",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        stories_text:stories
      })
  })

  const text = await response.text()

  result.textContent=text

}

</script>

</body>
</html>
